name: weekly-classify
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}
permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run classify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_ENTERPRISE: ${{ secrets.GITHUB_ENTERPRISE }}
          GITHUB_ORG: ${{ secrets.GITHUB_ORG }}
          VALUE_CONFIG_PATH: config/value_config.sample.yml
