name: nightly-etl
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: {}
jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run etl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BURNRATE_CONFIG: config/burnrate.yml
