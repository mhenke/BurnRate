version: '3.9'
services:
  db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: burnrate
      POSTGRES_USER: burnrate
      POSTGRES_PASSWORD: changeme
    ports:
      - '5432:5432'
    volumes:
      - burnrate-data:/var/lib/postgresql/data

volumes:
  burnrate-data:
