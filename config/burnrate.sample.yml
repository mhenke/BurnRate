github:
  enterprise: acme
  org: acme-inc
  token: ${GITHUB_TOKEN}
postgres:
  url: ${DATABASE_URL}
thresholds:
  alert:
    warningPct: 90
    escalationPct: 100
    criticalPct: 110
  classify:
    extremePct: 0.85
    highPct: 0.60
    mediumPct: 0.25
  forecast:
    trendSlope: 0.1
    anomalyZscore: 2.5

# Notification channels (all optional — if omitted, BurnRate runs silent)
# Each provider has minLevel: 'warning' by default, meaning only
# warning/escalation/critical alerts are dispatched.
# Set minLevel: 'ok' to receive all-clear notifications too.
notifications:
  renotifyHours: 24      # re-notify if still at same level after N hours
  escalateDays: 3         # escalate to next level if unresolved after N days
  providers:
